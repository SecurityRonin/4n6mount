name: mount-smoke

# End-to-end mount smoke tests: mint a fixture per format, mount it, and read a
# known file back through the mount — on both FUSE (Linux) and WinFsp (Windows).
# Deps resolve from crates.io (all fleet crates are published); a path-strip step
# drops the local `../sibling` path deps so no sibling checkout is needed.

on:
  push:
    branches: [main, worktree-winfsp]
  pull_request:
  workflow_dispatch:

jobs:
  gen-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install format tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip p7zip-full genisoimage ntfs-3g ewf-tools qemu-utils e2fsprogs
      - name: Mint fixtures
        run: bash scripts/smoke/gen-fixtures.sh fixtures
      - uses: actions/upload-artifact@v4
        with:
          name: fixtures
          path: fixtures/

  smoke-linux:
    needs: gen-fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Use crates.io for fleet deps (drop local path deps)
        run: sed -i -E 's/, path = "[^"]*"//' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev
      - name: Build (default + memory)
        run: cargo build --features memory
      - uses: actions/download-artifact@v4
        with:
          name: fixtures
          path: fixtures
      - name: FUSE mount smoke
        run: bash scripts/smoke/smoke.sh target/debug/4n6mount fixtures

  smoke-windows:
    needs: gen-fixtures
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Use crates.io for fleet deps (drop local path deps)
        shell: pwsh
        run: (Get-Content Cargo.toml) -replace ', path = "[^"]*"','' | Set-Content Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - name: Install WinFsp + LLVM (direct GitHub downloads, fail-loud)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'; $ProgressPreference = 'SilentlyContinue'
          # WinFsp from the GitHub MSI - the Chocolatey community feed is flaky (504s).
          Invoke-WebRequest https://github.com/winfsp/winfsp/releases/download/v2.1/winfsp-2.1.25156.msi -OutFile winfsp.msi
          Start-Process msiexec.exe -ArgumentList '/i','winfsp.msi','/qn' -Wait
          if (-not (Test-Path 'C:\Program Files (x86)\WinFsp\bin\winfsp-x64.dll')) { throw 'WinFsp install failed' }
          # LLVM (libclang for winfsp-sys bindgen) from the GitHub release.
          Invoke-WebRequest https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/LLVM-22.1.8-win64.exe -OutFile llvm.exe
          Start-Process .\llvm.exe -ArgumentList '/S' -Wait
          if (-not (Test-Path 'C:\Program Files\LLVM\bin\libclang.dll')) { throw 'LLVM install failed' }
      - name: Build (default + memory)
        shell: pwsh
        env:
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: cargo build --features memory
      - uses: actions/download-artifact@v4
        with:
          name: fixtures
          path: fixtures
      - name: WinFsp mount smoke
        shell: pwsh
        run: scripts/smoke/smoke.ps1 -Bin target\debug\4n6mount.exe -Fix fixtures
