name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

# Every job that resolves dependencies (clippy, test, msrv, deny, geiger) needs
# this crate's fleet path dependencies. Rather than check each sibling repo out
# at the matching `../sibling` location -- a list that silently goes stale every
# time a format is added -- we strip the `path = "..."` keys so Cargo resolves
# the fleet crates from crates.io (all are published). The committed Cargo.lock
# is path-based for local dev, so `--locked` is dropped here; CI exercises the
# published-dependency graph instead.
# The `fuser` crate links libfuse at build time, so build jobs install
# libfuse3-dev + pkg-config.

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Use crates.io for fleet deps (drop local path deps)
        run: sed -i -E 's/, path = "[^"]*"//' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Use crates.io for fleet deps (drop local path deps)
        run: sed -i -E 's/, path = "[^"]*"//' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo test

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Use crates.io for fleet deps (drop local path deps)
        run: sed -i -E 's/, path = "[^"]*"//' Cargo.toml
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo test

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Use crates.io for fleet deps (drop local path deps)
        run: sed -i -E 's/, path = "[^"]*"//' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-deny
      - run: cargo deny check

  secrets:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      # gitleaks-action v2+ demands a paid GITLEAKS_LICENSE for organization
      # repos; the upstream binary itself is unrestricted, so we download and
      # run it directly to keep the secret scan free and license-free.
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - run: gitleaks detect --source . --redact --no-banner -v

  geiger:
    name: Unsafe Audit (cargo-geiger)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - run: sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Use crates.io for fleet deps (drop local path deps)
        run: sed -i -E 's/, path = "[^"]*"//' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo install cargo-geiger --locked
      - run: cargo geiger 2>&1 || true
