[package]
name = "forensic-mount"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
description = "Universal forensic FUSE mount framework with ForensicFs trait"
license = "Apache-2.0"

[[bin]]
name = "4n6mount"
path = "src/main.rs"

[features]
default = ["ext4", "ewf", "iso", "vmdk", "tarball", "zip", "sevenz", "ntfs", "hfsplus", "exfat", "apfs"]
ext4 = ["dep:ext4fs"]
ewf = ["dep:ewf"]
iso = ["dep:iso9660-forensic"]
vmdk = ["dep:vmdk"]
ntfs = ["dep:ntfs-core"]
hfsplus = ["dep:hfsplus-forensic"]
exfat = ["dep:exfat-fs"]
apfs = ["dep:apfs-core"]
memory = []  # RED: deps wired in the GREEN step
tarball = ["dep:tar", "dep:flate2", "dep:bzip2"]
zip = ["dep:zip"]
sevenz = ["dep:sevenz-rust"]

[dependencies]
clap = { version = "4", features = ["derive"] }
ext4fs = { package = "ext4fs-core", version = "0.1.0", path = "../ext4fs-forensic/ext4fs-core", optional = true }
ewf = { version = "0.2.1", path = "../ewf/ewf", optional = true }
vmdk = { package = "vmdk-core", version = "0.7.0", path = "../vmdk-forensic/core", optional = true }
iso9660-forensic = { version = "0.6.0", path = "../iso9660-forensic/iso", optional = true }
ntfs-core = { version = "0.8.1", path = "../ntfs-forensic/core", optional = true }
hfsplus-forensic = { version = "0.1.1", path = "../hfsplus-forensic", optional = true }
exfat-fs = { version = "0.1.3", optional = true }
apfs-core = { version = "0.1.0", path = "../apfs-forensic/core", optional = true }
fuser = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
md-5 = "0.10"
rusqlite = { version = "0.31", features = ["bundled"] }
libc = "0.2"
tar = { version = "0.4", optional = true }
flate2 = { version = "1", optional = true }
bzip2 = { version = "0.5", optional = true }
zip = { version = "2", optional = true }
sevenz-rust = { version = "0.6", optional = true }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_sign_loss = "allow"
too_many_lines = "allow"
needless_pass_by_value = "allow"
similar_names = "allow"
