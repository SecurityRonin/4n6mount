[package]
name = "forensic-mount"
version = "0.3.0"
edition = "2021"
rust-version = "1.85"
description = "Mount forensic disk images, archives, and memory dumps as a filesystem on Linux, macOS, and Windows — ext4/NTFS/exFAT/HFS+/APFS/ISO, EWF/VMDK containers, zip/7z/tar, LiME/AVML/crash dumps"
license = "Apache-2.0"
repository = "https://github.com/SecurityRonin/4n6mount"
homepage = "https://github.com/SecurityRonin/4n6mount"
documentation = "https://docs.rs/forensic-mount"
readme = "README.md"
keywords = ["forensics", "fuse", "dfir", "filesystem", "memory-forensics"]
categories = ["filesystem", "command-line-utilities"]
# Test fixtures, CI smoke harness, and workflows are not needed by consumers.
exclude = ["tests/data/*", "scripts/smoke/*", ".github/*", "fuzz/*"]

[[bin]]
name = "4n6mount"
path = "src/main.rs"

[features]
default = ["ext4", "ewf", "iso", "vmdk", "tarball", "zip", "sevenz", "ntfs", "hfsplus", "exfat", "apfs"]
ext4 = ["dep:ext4fs"]
ewf = ["dep:ewf"]
iso = ["dep:iso9660-forensic"]
vmdk = ["dep:vmdk"]
ntfs = ["dep:ntfs-core"]
hfsplus = ["dep:hfsplus-forensic"]
exfat = ["dep:exfat-fs"]
apfs = ["dep:apfs-core"]
memory = ["dep:memf-format", "dep:memf-core", "dep:memf-session", "dep:memf-symbols", "dep:memf-windows", "dep:memf-linux"]
tarball = ["dep:tar", "dep:flate2", "dep:bzip2"]
zip = ["dep:zip"]
sevenz = ["dep:sevenz-rust"]

[dependencies]
clap = { version = "4", features = ["derive"] }
ext4fs = { package = "ext4fs-core", version = "0.1.0", path = "../ext4fs-forensic/ext4fs-core", optional = true }
ewf = { version = "0.2.1", path = "../ewf/ewf", optional = true }
vmdk = { package = "vmdk-core", version = "0.7.0", path = "../vmdk-forensic/core", optional = true }
iso9660-forensic = { version = "0.6.0", path = "../iso9660-forensic/iso", optional = true }
ntfs-core = { version = "0.8.1", path = "../ntfs-forensic/core", optional = true }
hfsplus-forensic = { version = "0.1.1", path = "../hfsplus-forensic", optional = true }
exfat-fs = { version = "0.1.3", optional = true }
apfs-core = { version = "0.1.0", optional = true }
memf-format = { version = "0.2", path = "../memory-forensic/crates/memf-format", optional = true }
memf-core = { version = "0.2", path = "../memory-forensic/crates/memf-core", optional = true }
memf-session = { version = "0.2", path = "../memory-forensic/crates/memf-session", optional = true }
memf-symbols = { version = "0.2", path = "../memory-forensic/crates/memf-symbols", optional = true }
memf-windows = { version = "0.2", path = "../memory-forensic/crates/memf-windows", optional = true }
memf-linux = { version = "0.2", path = "../memory-forensic/crates/memf-linux", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
md-5 = "0.10"
rusqlite = { version = "0.31", features = ["bundled"] }
libc = "0.2"
tar = { version = "0.4", optional = true }
flate2 = { version = "1", optional = true }
bzip2 = { version = "0.5", optional = true }
zip = { version = "2", optional = true }
sevenz-rust = { version = "0.6", optional = true }

# FUSE backend is Unix-only (libfuse / macFUSE). On Windows the mount layer uses
# WinFsp instead (see the windows target table below).
[target.'cfg(unix)'.dependencies]
fuser = "0.15"

# WinFsp mount backend — Windows only. `winfsp` wraps the native WinFsp 2.x
# runtime; `widestring`/`windows-sys` provide the UTF-16 + Win32 attribute types
# the FileSystemContext trait uses.
[target.'cfg(windows)'.dependencies]
# Dokan (MIT) Rust bindings for Windows user-mode filesystem mounting. The
# Dokany runtime (dual LGPL/MIT) is installed separately, like FUSE on Unix, so
# only MIT code enters the dependency graph.
dokan = "0.3"
widestring = "1"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_sign_loss = "allow"
too_many_lines = "allow"
needless_pass_by_value = "allow"
similar_names = "allow"
