[package]
name = "forensic-mount"
version = "0.1.0"
edition = "2021"
description = "Universal forensic FUSE mount framework with ForensicFs trait"
license = "MIT"

[[bin]]
name = "4n6mount"
path = "src/main.rs"

[features]
default = ["ext4"]
ext4 = ["dep:ext4fs"]

[dependencies]
clap = { version = "4", features = ["derive"] }
ext4fs = { path = "../ext4fs-forensic/ext4fs", optional = true }
fuser = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
md-5 = "0.10"
rusqlite = { version = "0.31", features = ["bundled"] }
libc = "0.2"
